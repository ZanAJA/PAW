<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creamora - Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="split-screen">
        <div class="left-pane">
            </div>

        <div class="right-pane">
            <div class="form-container">
                <div class="brand">
                    <img src="CreamoraLogo.png"> Creamora
                </div>

                <h2>Login to Creamora</h2>

                <form action="#">
                    <div class="input-group">
                        <span class="icon icon-email"><img src="Email.png"></span>
                        <input type="email" placeholder="Email" required>
                    </div>

                    <div class="input-group">
                        <span class="icon icon-key"><img src="Key.png"></span>
                        <input type="password" placeholder="Password" id="password" required>
                    </div>

                    <div class="form-options">
                        <div class="remember-group">
                            <input type="checkbox" id="rememberMe" class="remember-checkbox">
                            <label for="rememberMe" class="remember-label">Remember Me</label>
                        </div>
                        <a href="#" class="forgot-pwd">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-primary">Login</button>

                    <div class="divider">
                        <span>OR</span>
                    </div>

                    <div class="social-login">
                        <button type="button" class="btn-social1">
                            <img src="Google.png">
                        </button>
                        <button type="button" class="btn-social2">
                            <img src="facebook.png">
                        </button>
                    </div>
                </form>

                <p class="footer-text">New here? <a href="SignUp.html">Sign up now</a></p>
            </div>
        </div>
    </div>
</body>
</html>
