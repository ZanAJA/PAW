<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creamora - Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="split-screen">
        <div class="left-pane">
            </div>

        <div class="right-pane">
            <div class="form-container">
                <div class="brand">
                    <img src="CreamoraLogo.png"> Creamora
                </div>

                <h2>Create account</h2>

                    <form action="#">
                        <div class="input-group">
                            <span class="icon icon-email"><img src="Email.png"></span>
                            <input type="email" placeholder="Email" required>
                        </div>

                        <div class="input-group">
                            <span class="icon icon-lock"><img src="lock.png"></span>
                            <input type="password" placeholder="Password" required>
                        </div>

                        <div class="input-group">
                            <span class="icon icon-lock"><img src="lockv2.png"></span>
                            <input type="password" placeholder="Confirm Password" required>
                        </div>

                        <div style="margin-bottom: 2rem;"></div>

                        <button type="submit" class="btn-primary">Sign up</button>

                        <div class="divider">
                            <span>OR</span>
                        </div>

                        <div class="social-login">
                            <button type="button" class="btn-social1">
                                <img src="Google.png">
                            </button>
                            <button type="button" class="btn-social2">
                                <img src="facebook.png">
                            </button>
                        </div>
                    </form>

                    <p class="footer-text">Already have an account? <a href="Login.html">Login now</a></p>
            </div>
        </div>
    </div>
</body>
</html>
